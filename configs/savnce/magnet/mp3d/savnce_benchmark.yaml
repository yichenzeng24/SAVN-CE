ENVIRONMENT:
  MAX_EPISODE_STEPS: 500
SIMULATOR:
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
  RGB_SENSOR:
    WIDTH: 128
    HEIGHT: 128
  DEPTH_SENSOR:
    WIDTH: 128
    HEIGHT: 128

  STEP_TIME: 0.25
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 15
  TYPE: "SAVNCE_DummySimulator"

  ACTION_SPACE_CONFIG: "v0"
  SCENE_DATASET: "mp3d"
  AUDIO:
    EVERLASTING: False
    HAS_DISTRACTOR_SOUND: False
    HAS_NOISE_SOUND: False
    RIR_SAMPLING_RATE: 16000
    MIC_TYPE: "binaural" # mono, binaural, ambisonics
    THREADS: 20
    SOURCE_SOUND_DIR: "data/sounds/semantic_splits"
    DISTRACTOR_SOUND_DIR: "data/sounds/1s_all_distractor"
    NOISE_SOUND_DIR: "data/sounds/NOISEX-92"

TASK:
  TYPE: SAVNCE_Task

  SENSORS: ["POSE_SENSOR", "ORACLE_ACCDDOA_SENSOR"]
  GOAL_SENSOR_UUID: ["oracle_accddoa"]
  POINTGOAL_WITH_GPS_COMPASS_SENSOR:
    GOAL_FORMAT: "POLAR"
    DIMENSIONALITY: 2
  GOAL_DESCRIPTOR_SENSOR:
    OUTPUT_SIZE: 84
    EMBEDDING_SIZE: 256
  ORACLE_ACCDDOA_SENSOR:
    DIMENSIONALITY: 2
    GOAL_FORMAT: "CARTESIAN"
    EVERLASTING: False
  ORACLE_POSITION_SENSOR:
    GOAL_FORMAT: "POLAR"
    DIMENSIONALITY: 2
    EVERLASTING: False
    USE_NORMALIZED_DISTANCE: True
  ORACLE_CATEGORY_SENSOR:
    EVERLASTING: False
    
  MEASUREMENTS: [
    "DISTANCE_TO_GOAL",
    "NORMALIZED_DISTANCE_TO_GOAL",
    "SUCCESS",
    "SPL",
    "SOFT_SPL",
    "NUM_ACTION",
    "SUCCESS_WEIGHTED_BY_NUM_ACTION",
    "SUCCESS_WHEN_SILENT",
    # "DISTRACTOR_SUCCESS"
  ]
  SUCCESS:
    SUCCESS_DISTANCE: 1.0
  DISTRACTOR_SUCCESS:
    DISTRACTOR_SUCCESS_DISTANCE: 1.0
  TOP_DOWN_MAP:
    MAP_RESOLUTION: 1024
    DRAW_BORDER: True
    DRAW_SHORTEST_PATH: True
  DISTANCE_TO_GOAL:
    DISTANCE_TO: POINT

DATASET:
  TYPE: "SAVNCE_Dataset"
  SPLIT: "train"
  CONTENT_SCENES: ["*"]
  VERSION: "v1"
  SCENES_DIR: "data/scene_datasets/mp3d"
  DATA_PATH: "data/datasets/savnce_dataset/mp3d/{version}/{split}/{split}.json.gz"