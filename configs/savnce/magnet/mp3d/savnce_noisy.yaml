ENVIRONMENT:
  MAX_EPISODE_STEPS: 500
SIMULATOR:
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
  RGB_SENSOR:
    WIDTH: 128
    HEIGHT: 128
  DEPTH_SENSOR:
    WIDTH: 128
    HEIGHT: 128

  STEP_TIME: 0.25
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 15
  TYPE: "SAVNCE_Simulator"
  
  ACTION_SPACE_CONFIG: "v0"
  SCENE_DATASET: "mp3d"
  AUDIO:
    EVERLASTING: False
    HAS_DISTRACTOR_SOUND: True
    HAS_NOISE_SOUND: True
    RIR_SAMPLING_RATE: 16000
    MIC_TYPE: "binaural" # mono, binaural, ambisonics
    THREADS: 20
    SOURCE_SOUND_DIR: "data/sounds/semantic_splits"
    DISTRACTOR_SOUND_DIR: "data/sounds/1s_all_distractor"
    NOISE_SOUND_DIR: "data/sounds/NOISEX-92"

TASK:
  TYPE: SAVNCE_Task

  SENSORS: [
    "BINAURAL_FEATURE_EXTRACTOR",
    "POSE_SENSOR",
    "ORACLE_CATEGORY_SENSOR",
    "GOAL_DESCRIPTOR_SENSOR",
    "ORACLE_ACCDDOA_SENSOR"
  ]
  GOAL_SENSOR_UUID: ["binaural_extractor"]
  POINTGOAL_WITH_GPS_COMPASS_SENSOR:
    GOAL_FORMAT: "POLAR"
    DIMENSIONALITY: 2
  GOAL_DESCRIPTOR:
    OUTPUT_SIZE: 256 # 84 or embedding_size
  ORACLE_ACCDDOA_SENSOR:
    DIMENSIONALITY: 2
    GOAL_FORMAT: "CARTESIAN"
    EVERLASTING: True
  ORACLE_POSITION_SENSOR:
    GOAL_FORMAT: "POLAR"
    DIMENSIONALITY: 2
    EVERLASTING: True
    USE_NORMALIZED_DISTANCE: True
  ORACLE_CATEGORY_SENSOR:
    EVERLASTING: True

  MEASUREMENTS: [
    "DISTANCE_TO_GOAL",
    "NORMALIZED_DISTANCE_TO_GOAL",
    "SUCCESS",
    "SPL",
    "SOFT_SPL",
    "NUM_ACTION",
    "SUCCESS_WEIGHTED_BY_NUM_ACTION",
    "SUCCESS_WHEN_SILENT"
  ]
  SUCCESS:
    SUCCESS_DISTANCE: 1.0
  TOP_DOWN_MAP:
    MAP_RESOLUTION: 1024
    DRAW_BORDER: True
    DRAW_SHORTEST_PATH: True
  DISTANCE_TO_GOAL:
    DISTANCE_TO: POINT

DATASET:
  TYPE: "SAVNCE_Dataset"
  SPLIT: "train_distractor"
  CONTENT_SCENES: ["*"]
  VERSION: "v1"
  SCENES_DIR: "data/scene_datasets/mp3d"
  DATA_PATH: "data/datasets/savnce_dataset/mp3d/{version}/{split}/{split}.json.gz"